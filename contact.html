<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Contact</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto+Slab"
      rel="stylesheet"
    />

    <script
      src="https://kit.fontawesome.com/a3b51839b3.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles/business.css" />
    <link rel="stylesheet" href="styles/nav.css" />
    <link rel="stylesheet" href="styles/flooter.css" />
    <link rel="stylesheet" href="styles/skewed.css" />
    <link rel="stylesheet" href="styles/page.css" />
    <link rel="stylesheet" href="styles/helpers.css" />
    <link rel="stylesheet" href="styles/contact.css" />
    <link rel="stylesheet" href="styles/form.css" />
    <link rel="stylesheet" href="styles/button.css" />
    <link rel="stylesheet" href="styles/media.css" />
  </head>
  <body>
    <div class="skewed-header">
      <div
        class="header-bg"
        style="background-image: url(&quot;images/pics/contact-bg.webp&quot;)"
      ></div>

      <div class="skewed-header-wrapper">
        <div class="skewed-header-content">
          <div class="heading-wrapper">
            <h1>Contact</h1>
          </div>

          <div class="links-wrapper">
            <div class="navlink">
              <a href="index.html">Home</a>
            </div>
            <div class="navlink">
              <a href="about.html">About Us</a>
            </div>
            <div class="navlink">
              <a href="menu.html">Menu</a>
            </div>
            <div class="navlink">
              <a href="contact.html">Contact</a>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="page-container">
      <div class="contact-grid-wrapper">
        <div class="company-metadata-sidebar-wrapper">
          <div class="logo">
            <img src="images/logos/sky-touch-food-logo-black.png" alt="Logo" />
          </div>

          <div class="company-details-wrapper">
            <i class="fa-solid fa-map-location-dot"></i>
            <div>
              Near Ganesh Temple <br />
              Sailesh Street, Eluru
            </div>
          </div>
          <div class="company-details-wrapper">
            <i class="fa-solid fa-mobile"></i>
            <div>9876543210</div>
          </div>
          <div class="company-details-wrapper">
            <i class="fa-regular fa-clock"></i>
            <div>6PM Wed-Sat-Sun</div>
          </div>
        </div>

        <div class="form">
          <div class="form-group">
            <input type="text" id="fullName" placeholder="Name" />
            <label for="fullName">Name</label>
          </div>

          <div class="form-group">
            <input type="email" id="email" placeholder="Email" />
            <label for="email">Email</label>
          </div>

          <div class="form-group">
            <textarea
              name="message"
              id="message"
              placeholder="Message"
            ></textarea>
            <label for="message">Message</label>
          </div>
          <div class="spacer10"></div>
          <div class="center-btn-wrapper">
            <button type="submit" class="btn">Send</button>
          </div>
        </div>
      </div>
    </div>

    <div class="spacer60"></div>

    <div class="footer">
      <div class="logo-footer">
        <img src="images/logos/sky-touch-food-logo.png" alt="Logo" />
      </div>

      <div class="footer-phone-hours">
        <span class="phone"> 9876543210 </span>
        <span class="hours"> 6PM Wed-Sat-Sun </span>
      </div>

      <div class="links-wrapper">
        <div class="navlink">
          <a href="index.html">Home</a>
        </div>
        <div class="navlink">
          <a href="about.html">About Us</a>
        </div>
        <div class="navlink">
          <a href="menu.html">Menu</a>
        </div>
        <div class="navlink">
          <a href="contact.html">Contact</a>
        </div>
      </div>

      <div class="social-media-icons-wrapper">
        <a href="#">
          <i class="fa-brands fa-instagram"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-facebook"></i>
        </a>

        <a href="#">
          <i class="fa-brands fa-x-twitter"></i>
        </a>
      </div>
      <div class="copyright-wrapper">
        &copy; 2024 SKY Touch &#124; All rights reserved
      </div>
    </div>
  </body>
</html>
